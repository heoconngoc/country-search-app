<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Country Info</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <div class="left">
      <h1>Country Information</h1>

      <div id="div_search">
        <input id="search" type="search" placeholder="Enter country name...">
        <ul id="suggest-list" class="suggest hidden"></ul>
        <button id="bt_search">Search</button>
      </div>

      <div id="country-card" class="card card-hidden"></div>

      <div id="history">
        <h3>Search history</h3>
        <ul id="history-list"></ul>
      </div>
    </div>

    <div class="right">
      <button id="toggle-theme">🌙</button>
      <iframe id="map"></iframe>
    </div>
  </div>
  <footer>
    © 2026 hoangtunanggia
  </footer>

  <script src="script.js"></script>
</body>

</html>
